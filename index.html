<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
        <main>
  <section class="hero-click" id="inicio">

    <!-- Background image -->
    <div class="hero-click__bg">
        <img src="img/fondo.png" alt="Click Studio background" loading="eager">
    </div>

    <!-- Overlays -->
    <div class="hero-click__overlay"></div>
    <div class="hero-click__grain"></div>

    <!-- Geometric decorations -->
    <span class="hero-click__geo hero-click__geo--rule-a"></span>
    <span class="hero-click__geo hero-click__geo--rule-b"></span>
    <div  class="hero-click__geo hero-click__geo--dots"></div>
    <div  class="hero-click__geo hero-click__geo--bracket"></div>
    <span class="hero-click__geo hero-click__geo--num">01</span>

    <!-- Main content -->
    <div class="hero-click__content">

        <!-- Eyebrow -->
        <div class="hero-click__eyebrow">
            <span class="hero-click__eyebrow-line"></span>
            <span class="hero-click__eyebrow-text">Diseño Web · Conversión · Resultados</span>
        </div>

        <!-- Brand name -->
        <h1 class="hero-click__title">
            <span class="hero-click__line hero-click__line--a">CLICK</span>
            <span class="hero-click__line hero-click__line--b">Studio</span>
        </h1>

        <!-- Tagline -->
        <p class="hero-click__tagline">Landing pages que convierten visitantes en clientes</p>

        <!-- Stats -->
        <div class="hero-click__stats">
            <div class="hero-click__stat">
                <span class="hero-click__stat-num">+120</span>
                <span class="hero-click__stat-label">Proyectos entregados</span>
            </div>
            <div class="hero-click__stat">
                <span class="hero-click__stat-num">98%</span>
                <span class="hero-click__stat-label">Clientes satisfechos</span>
            </div>
            <div class="hero-click__stat">
                <span class="hero-click__stat-num">3×</span>
                <span class="hero-click__stat-label">Más conversiones</span>
            </div>
        </div>

        <!-- CTAs -->
        <div class="hero-click__cta">
            <a href="#contacto" class="hero-click__btn-primary">
                <span>Quiero mi pagina web</span>
            </a>
            <a href="#portafolio" class="hero-click__btn-ghost">
                Ver portafolio
                <span class="hero-click__arrow">→</span>
            </a>
        </div>

    </div>

    <!-- Scroll indicator -->
    <div class="hero-click__scroll">
        <span class="hero-click__scroll-text">Scroll</span>
        <span class="hero-click__scroll-line"></span>
    </div>



</section>

</main>
</body>
</html>
